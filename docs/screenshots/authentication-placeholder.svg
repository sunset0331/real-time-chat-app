<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Authentication screenshot placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f7ff" />
      <stop offset="100%" stop-color="#e8f0ff" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />
  <rect x="380" y="140" width="520" height="440" rx="20" fill="#ffffff" stroke="#cfd9f0" stroke-width="2" />
  <text x="640" y="220" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" fill="#1d2b45" font-weight="700">
    Authentication Screen
  </text>
  <text x="640" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#4b5f86">
    Placeholder Image
  </text>
  <rect x="460" y="315" width="360" height="54" rx="10" fill="#f7faff" stroke="#cbd6ee" />
  <rect x="460" y="387" width="360" height="54" rx="10" fill="#f7faff" stroke="#cbd6ee" />
  <rect x="460" y="462" width="360" height="56" rx="10" fill="#1f5eff" />
  <text x="640" y="497" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#ffffff" font-weight="600">
    Login / Register
  </text>
  <text x="640" y="630" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#5a6f95">
